<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IKIVIY博客 — WRITE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ===== 暗色主题（默认） ===== */
:root,[data-theme="dark"]{
  --bg:#030014;--bg-deep:#06060e;
  --bg-card:rgba(20,20,40,0.6);
  --text-primary:#f0eef5;--text-secondary:#9b97b0;--text-muted:#5c5878;
  --accent:#8b5cf6;--accent-light:#a78bfa;--accent-deep:#7c3aed;
  --accent-rgb:139,92,246;
  --border:rgba(139,92,246,0.12);--border-light:rgba(139,92,246,0.06);
  --nav-bg:rgba(3,0,20,0.85);
  --star-color:255,255,255;
  --ring-color:186,156,255;
  --ring-bg-alpha:.04;
  --ring-border-alpha:.3;
  --dot-bg-alpha:.01;
  --dot-border-alpha:.3;
  --circle-mask-color:rgba(186,156,255,.6);
  --bh-core-inner:#030014;
  --bh-core-glow:rgba(139,92,246,0.1);
  --bh-core-glow2:rgba(139,92,246,0.05);
  --bh-core-glow3:rgba(100,60,200,0.03);
  --bh-core-inset:rgba(3,0,20,0.9);
  --bh-ring-border:rgba(186,156,255,0.2);
  --bh-ring-shadow:rgba(139,92,246,0.08);
  --bh-ring-shadow2:rgba(139,92,246,0.05);
  --bh-ring-inset:rgba(139,92,246,0.05);
  --bh-glow-color:rgba(139,92,246,0.06);
  --bh-glow-color2:rgba(139,92,246,0.03);
  --featured-img-bg:linear-gradient(135deg,#0f0c29 0%,#302b63 40%,#24243e 100%);
  --featured-badge-bg:rgba(0,0,0,0.5);
  --featured-badge-border:rgba(139,92,246,0.2);
  --thumb1:linear-gradient(135deg,#1a1a2e,#11998e);
  --thumb2:linear-gradient(135deg,#2d1b69,#fc4a1a);
  --thumb3:linear-gradient(135deg,#0f0c29,#302b63);
  --thumb4:linear-gradient(135deg,#1a2a6c,#fdbb2d);
  --thumb5:linear-gradient(135deg,#141e30,#243b55);
  --logo-dot-shadow:0 0 10px rgba(139,92,246,0.6);
  --cat-active-shadow:0 0 15px rgba(139,92,246,0.3);
  --selection-bg:#8b5cf6;
}

/* ===== 亮色主题 ===== */
[data-theme="light"]{
  --bg:#e0e0e0;--bg-deep:#d5d5d5;
  --bg-card:rgba(255,255,255,0.7);
  --text-primary:#1a1a1a;--text-secondary:#6b6b6b;--text-muted:#999;
  --accent:#1a1a1a;--accent-light:#555;--accent-deep:#000;
  --accent-rgb:26,26,26;
  --border:rgba(0,0,0,0.08);--border-light:rgba(0,0,0,0.04);
  --nav-bg:rgba(224,224,224,0.85);
  --star-color:0,0,0;
  --ring-color:0,0,0;
  --ring-bg-alpha:.03;
  --ring-border-alpha:.15;
  --dot-bg-alpha:.01;
  --dot-border-alpha:.15;
  --circle-mask-color:rgba(0,0,0,.4);
  --bh-core-inner:#000;
  --bh-core-glow:rgba(0,0,0,0.4);
  --bh-core-glow2:rgba(0,0,0,0.15);
  --bh-core-glow3:rgba(0,0,0,0.05);
  --bh-core-inset:rgba(0,0,0,0.8);
  --bh-ring-border:rgba(0,0,0,0.12);
  --bh-ring-shadow:rgba(0,0,0,0.06);
  --bh-ring-shadow2:rgba(0,0,0,0.03);
  --bh-ring-inset:rgba(0,0,0,0.04);
  --bh-glow-color:rgba(0,0,0,0.06);
  --bh-glow-color2:rgba(0,0,0,0.03);
  --featured-img-bg:linear-gradient(135deg,#e8e8ec 0%,#d0d0d8 40%,#c8c8d0 100%);
  --featured-badge-bg:rgba(255,255,255,0.7);
  --featured-badge-border:rgba(0,0,0,0.08);
  --thumb1:linear-gradient(135deg,#d4d4d8,#a8a8b0);
  --thumb2:linear-gradient(135deg,#c8c8d0,#b0a8a0);
  --thumb3:linear-gradient(135deg,#d0d0d8,#b8b8c0);
  --thumb4:linear-gradient(135deg,#c8c8d0,#d8d0b0);
  --thumb5:linear-gradient(135deg,#d0d0d8,#c0c0c8);
  --logo-dot-shadow:none;
  --cat-active-shadow:0 2px 8px rgba(0,0,0,0.15);
  --selection-bg:rgba(26,26,26,0.12);
}

html{font-size:16px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-weight:300;background:var(--bg);color:var(--text-primary);line-height:1.7;overflow-x:hidden;max-width:1080px;margin:0 auto;min-height:100vh;position:relative}

/* ===== 主题切换按钮 ===== */
.theme-toggle{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text-muted);font-size:14px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .3s ease;flex-shrink:0;
  box-sizing:border-box;
}
.theme-toggle:active{border-color:var(--accent);color:var(--accent)}

/* ===== 导航栏 ===== */
.navbar{position:fixed;top:0;left:0;right:0;max-width:1080px;margin:0 auto;z-index:100;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;background:transparent;backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px);border-bottom:1px solid transparent;transition:all .5s ease}
.navbar.scrolled{background:var(--nav-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom-color:var(--border)}
.logo{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:6px;color:var(--text-primary);text-transform:uppercase}
.logo-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:var(--logo-dot-shadow);margin-left:2px;vertical-align:middle;transition:background .4s,box-shadow .4s}
.nav-actions{display:flex;gap:10px}
.nav-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s ease;font-size:14px;box-sizing:border-box}
.nav-btn:active{border-color:var(--accent);color:var(--accent)}

/* ===== Hero ===== */
.hero{position:relative;z-index:10;height:120px;display:flex;align-items:center;justify-content:center}

/* ===== 分类标签（编辑器内复用） ===== */
.cat-scroll{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:4px 0}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-tag{flex-shrink:0;padding:8px 18px;border-radius:100px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-muted);font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:0.68rem;letter-spacing:1.5px;cursor:pointer;transition:all .3s ease;white-space:nowrap;box-shadow:inset 1px 1px 3px rgba(128,128,128,.08),inset -1px -1px 3px rgba(128,128,128,.04)}
[data-theme="dark"] .cat-tag{box-shadow:inset 1px 1px 3px rgba(0,0,0,.4),inset -1px -1px 3px rgba(255,255,255,.03)}
[data-theme="light"] .cat-tag{box-shadow:inset 1px 1px 3px rgba(0,0,0,.06),inset -1px -1px 3px rgba(255,255,255,.8)}
.cat-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--cat-active-shadow)}
.cat-tag:active:not(.active){border-color:var(--accent-light);color:var(--accent-light)}

/* ===== Section Header ===== */
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-title{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:0.65rem;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase}
.section-link{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:0.65rem;color:var(--accent-light);letter-spacing:2px;cursor:pointer}

/* ===== 编辑器卡片 ===== */
.editor-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;box-shadow:inset 2px 2px 6px rgba(128,128,128,.08),inset -2px -2px 6px rgba(128,128,128,.04)}
[data-theme="dark"] .editor-card{box-shadow:inset 2px 2px 6px rgba(0,0,0,.4),inset -2px -2px 6px rgba(255,255,255,.03)}
[data-theme="light"] .editor-card{box-shadow:inset 2px 2px 6px rgba(0,0,0,.06),inset -2px -2px 6px rgba(255,255,255,.8)}
.editor-title{width:100%;border:none;background:transparent;color:var(--text-primary);font-size:1.4rem;font-weight:600;outline:none;padding:8px 0;font-family:'Space Grotesk','Noto Sans SC',sans-serif}
.editor-title::placeholder{color:var(--text-muted)}
.editor-tags{display:flex;gap:8px;padding:12px 0;border-bottom:1px solid var(--border-light);margin-bottom:16px}
.editor-tag{padding:6px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-muted);font-size:0.65rem;letter-spacing:1px;cursor:pointer;transition:all .3s ease;box-shadow:inset 1px 1px 3px rgba(128,128,128,.08),inset -1px -1px 3px rgba(128,128,128,.04)}
[data-theme="dark"] .editor-tag{box-shadow:inset 1px 1px 3px rgba(0,0,0,.4),inset -1px -1px 3px rgba(255,255,255,.03)}
[data-theme="light"] .editor-tag{box-shadow:inset 1px 1px 3px rgba(0,0,0,.06),inset -1px -1px 3px rgba(255,255,255,.8)}
.editor-tag.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:var(--cat-active-shadow)}
.editor-tag:active:not(.active){border-color:var(--accent-light);color:var(--accent-light)}
.editor-content{width:100%;border:none;background:transparent;color:var(--text-primary);font-size:0.85rem;line-height:1.8;outline:none;resize:none;font-family:'Space Grotesk','Noto Sans SC',sans-serif;min-height:300px}
.editor-content::placeholder{color:var(--text-muted)}
.editor-footer{display:flex;justify-content:space-between;align-items:center;padding-top:16px;border-top:1px solid var(--border-light);margin-top:16px}
.editor-count{font-size:0.65rem;color:var(--text-muted);letter-spacing:1px}
.editor-publish{padding:10px 28px;border-radius:100px;border:1px solid var(--accent);background:var(--accent);color:#fff;font-size:0.7rem;letter-spacing:2px;cursor:pointer;font-family:'Space Grotesk','Noto Sans SC',sans-serif;transition:all .3s ease}
.editor-publish:active{opacity:0.8}

/* ===== 草稿卡片 ===== */
.draft-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:16px 20px;margin-bottom:12px;cursor:pointer;box-shadow:inset 2px 2px 6px rgba(128,128,128,.08),inset -2px -2px 6px rgba(128,128,128,.04);transition:all .3s ease}
[data-theme="dark"] .draft-card{box-shadow:inset 2px 2px 6px rgba(0,0,0,.4),inset -2px -2px 6px rgba(255,255,255,.03)}
[data-theme="light"] .draft-card{box-shadow:inset 2px 2px 6px rgba(0,0,0,.06),inset -2px -2px 6px rgba(255,255,255,.8)}
.draft-card:active{opacity:0.7}
.draft-title{font-size:0.9rem;font-weight:500;color:var(--text-primary);margin-bottom:6px}
.draft-meta{display:flex;gap:12px;font-size:0.62rem;color:var(--text-muted);letter-spacing:1px}
.draft-tag{font-size:0.55rem;color:var(--accent-light);letter-spacing:1.5px;padding:2px 8px;border:1px solid var(--border);border-radius:100px}

/* ===== 底部导航 ===== */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:1080px;margin:0 auto;background:var(--nav-bg);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid var(--border-light);display:flex;justify-content:space-around;padding:12px 0 calc(12px + env(safe-area-inset-bottom));z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:4px 16px;border:none;background:none;color:var(--text-muted);transition:color .3s ease}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:16px;line-height:1}
.nav-label{font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:0.5rem;letter-spacing:2px}

/* ===== Scroll Reveal ===== */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}

@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){.hero-title{font-size:2.2rem}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
::-webkit-scrollbar{width:0}
::selection{background:var(--selection-bg);color:var(--text-primary)}
</style>
</head>
<body>

<nav class="navbar" id="navbar">
  <a href="index.html" class="logo" style="text-decoration:none;color:inherit">IKIVIY<span class="logo-dot"></span></a>
  <div class="nav-actions">
    <button class="theme-toggle" id="themeToggle" aria-label="切换主题">◐</button>
    <button class="nav-btn" aria-label="搜索">⌕</button>
    <button class="nav-btn" aria-label="菜单">☰</button>
  </div>
</nav>

<section class="hero">
  <h2 style="font-family:'Space Grotesk','Noto Sans SC',sans-serif;font-size:1.8rem;font-weight:600;letter-spacing:-0.5px;color:var(--text-primary)">写作</h2>
</section>

<!-- 主内容区域 -->
<div style="position:relative;z-index:10;padding:0 24px 120px">

  <!-- 写作编辑器 -->
  <div class="editor-card reveal">
    <input class="editor-title" type="text" placeholder="输入标题...">
    <div class="editor-tags">
      <button class="editor-tag active">技术</button>
      <button class="editor-tag">设计</button>
      <button class="editor-tag">随笔</button>
      <button class="editor-tag">宇宙</button>
      <button class="editor-tag">AI</button>
    </div>
    <textarea class="editor-content" placeholder="开始写作..."></textarea>
    <div class="editor-footer">
      <span class="editor-count" id="wordCount">0 字</span>
      <button class="editor-publish">PUBLISH</button>
    </div>
  </div>

  <!-- 草稿箱 -->
  <div class="reveal">
    <div class="section-header">
      <span class="section-title">DRAFTS</span>
      <span class="section-link">VIEW ALL →</span>
    </div>

    <div class="draft-card">
      <div class="draft-title">关于量子计算的思考碎片</div>
      <div class="draft-meta">
        <span>2026.04.18</span>
        <span>1,200字</span>
        <span class="draft-tag">技术</span>
      </div>
    </div>

    <div class="draft-card">
      <div class="draft-title">设计系统的边界</div>
      <div class="draft-meta">
        <span>2026.04.15</span>
        <span>860字</span>
        <span class="draft-tag">设计</span>
      </div>
    </div>

    <div class="draft-card">
      <div class="draft-title">深夜电台：给未来的自己</div>
      <div class="draft-meta">
        <span>2026.04.10</span>
        <span>540字</span>
        <span class="draft-tag">随笔</span>
      </div>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item" style="text-decoration:none"><span class="nav-icon">◉</span><span class="nav-label">HOME</span></a>
  <button class="nav-item"><span class="nav-icon">◇</span><span class="nav-label">EXPLORE</span></button>
  <button class="nav-item active"><span class="nav-icon">✦</span><span class="nav-label">WRITE</span></button>
  <button class="nav-item"><span class="nav-icon">☰</span><span class="nav-label">ME</span></button>
</nav>

<script>
// ===== 主题切换 =====
(function(){
  const btn=document.getElementById('themeToggle');
  const html=document.documentElement;
  const saved=localStorage.getItem('theme');
  if(saved){html.setAttribute('data-theme',saved);btn.textContent=saved==='light'?'◑':'◐'}
  btn.addEventListener('click',()=>{
    const current=html.getAttribute('data-theme');
    const next=current==='dark'?'light':'dark';
    html.setAttribute('data-theme',next);
    btn.textContent=next==='light'?'◑':'◐';
    localStorage.setItem('theme',next);
  });
})();

// ===== 导航栏滚动 =====
const navbar=document.getElementById('navbar');
window.addEventListener('scroll',()=>{navbar.classList.toggle('scrolled',window.scrollY>40)},{passive:true});

// ===== Scroll Reveal =====
const revealObs=new IntersectionObserver(e=>{e.forEach(x=>{if(x.isIntersecting){x.target.classList.add('visible');revealObs.unobserve(x.target)}})},{threshold:.1,rootMargin:'0px 0px -30px 0px'});
document.querySelectorAll('.reveal').forEach(el=>revealObs.observe(el));

// ===== 编辑器标签切换 =====
document.querySelectorAll('.editor-tag').forEach(t=>{t.addEventListener('click',()=>{document.querySelectorAll('.editor-tag').forEach(x=>x.classList.remove('active'));t.classList.add('active')})});

// ===== 字数统计 =====
const textarea=document.querySelector('.editor-content');
const wordCount=document.getElementById('wordCount');
textarea.addEventListener('input',()=>{
  const len=textarea.value.replace(/\s/g,'').length;
  wordCount.textContent=len+' 字';
});

// ===== 底部导航 =====
document.querySelectorAll('.nav-item').forEach(n=>{n.addEventListener('click',()=>{document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));n.classList.add('active')})});
</script>
</body>
</html>
